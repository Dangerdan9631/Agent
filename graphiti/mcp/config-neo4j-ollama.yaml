# Graphiti MCP Server configuration for Neo4j + Ollama on the shared Docker network.
server:
  transport: "http"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "openai"
  model: ${OLLAMA_CHAT_MODEL:qwen3.5:4b}
  max_tokens: 4096
  providers:
    openai:
      api_key: ${OPENAI_API_KEY:ollama}
      api_url: ${OPENAI_API_URL:http://ollama:11434/v1}
      organization_id: ""

embedder:
  provider: "openai"
  model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
  dimensions: ${OLLAMA_EMBEDDING_DIM:768}
  providers:
    openai:
      api_key: ${OPENAI_API_KEY:ollama}
      api_url: ${OPENAI_API_URL:http://ollama:11434/v1}
      organization_id: ""

database:
  provider: "neo4j"
  providers:
    neo4j:
      uri: ${NEO4J_URI:bolt://neo4j:7687}
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:graphiti-password}
      database: ${NEO4J_DATABASE:neo4j}
      use_parallel_runtime: ${USE_PARALLEL_RUNTIME:false}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:main}
  episode_id_prefix: ${EPISODE_ID_PREFIX:}
  user_id: ${USER_ID:mcp_user}
  entity_types:
    - name: "Preference"
      description: "User preferences, choices, opinions, or selections"
    - name: "Requirement"
      description: "Specific needs, features, or functionality that must be fulfilled"
    - name: "Procedure"
      description: "Standard operating procedures and sequential instructions"
    - name: "Location"
      description: "Physical or virtual places where activities occur"
    - name: "Event"
      description: "Time-bound activities, occurrences, or experiences"
    - name: "Organization"
      description: "Companies, institutions, groups, or formal entities"
    - name: "Document"
      description: "Information content in various forms"
    - name: "Topic"
      description: "Subject of conversation, interest, or knowledge domain"
    - name: "Object"
      description: "Physical items, tools, devices, or possessions"
