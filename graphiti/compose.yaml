services:
  neo4j:
    image: neo4j:5.26.2
    container_name: agent-graphiti-neo4j
    restart: unless-stopped
    ports:
      - "${LAN_BIND_IP:-0.0.0.0}:${NEO4J_HTTP_PORT:-7474}:7474"
      - "${LAN_BIND_IP:-0.0.0.0}:${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-graphiti-password}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT:-512M}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-512M}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512M}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - default
      - agent-services
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:7474 >/dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  graphiti-rest:
    image: zepai/graphiti:latest
    container_name: agent-graphiti-rest
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OLLAMA_API_KEY:-ollama}
      OPENAI_BASE_URL: ${OLLAMA_OPENAI_BASE_URL:-http://ollama:11434/v1}
      MODEL_NAME: ${OLLAMA_CHAT_MODEL:-qwen3.5:4b}
      EMBEDDING_MODEL_NAME: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-graphiti-password}
      GRAPHITI_TELEMETRY_ENABLED: ${GRAPHITI_TELEMETRY_ENABLED:-false}
    ports:
      - "${LAN_BIND_IP:-0.0.0.0}:${GRAPHITI_REST_PORT:-8000}:8000"
    networks:
      - default
      - agent-services
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:standalone
    container_name: agent-graphiti-mcp
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OLLAMA_API_KEY:-ollama}
      OPENAI_API_URL: ${OLLAMA_OPENAI_BASE_URL:-http://ollama:11434/v1}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-graphiti-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      GRAPHITI_GROUP_ID: ${GRAPHITI_MCP_GROUP_ID:-main}
      SEMAPHORE_LIMIT: ${SEMAPHORE_LIMIT:-3}
      GRAPHITI_TELEMETRY_ENABLED: ${GRAPHITI_TELEMETRY_ENABLED:-false}
      CONFIG_PATH: /app/mcp/config/config.yaml
      PATH: /root/.local/bin:${PATH}
    volumes:
      - ./mcp/config-neo4j-ollama.yaml:/app/mcp/config/config.yaml:ro
    command:
      - uv
      - run
      - main.py
    ports:
      - "${LAN_BIND_IP:-0.0.0.0}:${GRAPHITI_MCP_PORT:-8001}:8000"
    networks:
      - default
      - agent-services
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  graphiti-api-wrapper:
    build:
      context: ./api-wrapper
    container_name: agent-graphiti-wrapper
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      OLLAMA_OPENAI_BASE_URL: ${OLLAMA_OPENAI_BASE_URL:-http://ollama:11434/v1}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3.5:4b}
      OLLAMA_SMALL_MODEL: ${OLLAMA_SMALL_MODEL:-qwen3.5:4b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_EMBEDDING_DIM: ${OLLAMA_EMBEDDING_DIM:-768}
      OPENAI_API_KEY: ${OLLAMA_API_KEY:-ollama}
      OPENAI_BASE_URL: ${OLLAMA_OPENAI_BASE_URL:-http://ollama:11434/v1}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-graphiti-password}
      GRAPHITI_ENABLE_RERANKER: ${GRAPHITI_ENABLE_RERANKER:-false}
      GRAPHITI_TELEMETRY_ENABLED: ${GRAPHITI_TELEMETRY_ENABLED:-false}
    ports:
      - "${LAN_BIND_IP:-0.0.0.0}:${GRAPHITI_WRAPPER_PORT:-8002}:8000"
    networks:
      - default
      - agent-services
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

volumes:
  neo4j-data:
  neo4j-logs:

networks:
  agent-services:
    external: true
    name: ${AGENT_DOCKER_NETWORK:-agent-services}
