services:
  ollama:
    image: ollama/ollama:latest
    container_name: agent-ollama
    restart: unless-stopped
    ports:
      - "${LAN_BIND_IP:-0.0.0.0}:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-1024}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      agent-services:
        aliases:
          - ollama
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  model-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3.5:4b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -eu
        echo "Pulling chat model: $${OLLAMA_CHAT_MODEL}"
        ollama pull "$${OLLAMA_CHAT_MODEL}"
        echo "Pulling embedding model: $${OLLAMA_EMBED_MODEL}"
        ollama pull "$${OLLAMA_EMBED_MODEL}"
        echo "Models are ready."
    networks:
      - agent-services

volumes:
  ollama-data:

networks:
  agent-services:
    external: true
    name: ${AGENT_DOCKER_NETWORK:-agent-services}